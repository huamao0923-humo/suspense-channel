<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>素材檢視 / 編輯 · 逐段素材包</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 20px 24px 60px; background: #0b0f15; color: #d7e0ea; font: 15px/1.6 "Microsoft JhengHei", system-ui, sans-serif; }
  h1 { font-size: 21px; margin: 0 0 4px; }
  .hint { color: #8295a8; margin: 0 0 16px; max-width: 880px; }
  .hint code { color: #9fc7ee; }
  .bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  label { color: #aab8c8; }
  select, .btn { background: #16202c; color: #e6eef7; border: 1px solid #2a3a4d; border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer; }
  .btn:hover { border-color: #4f86c0; background: #15293c; }
  .btn[disabled] { opacity: .45; cursor: default; }
  .btn.busy { opacity: .6; cursor: progress; }
  .pager { display: flex; gap: 8px; align-items: center; margin-left: auto; color: #8295a8; }
  .meta { color: #6f8aa6; font-size: 13px; }

  .seg { background: #111a25; border: 1px solid #223040; border-radius: 14px; padding: 16px 18px; margin-bottom: 16px; min-width: 0; }
  /* 卡片內：旁白（左，撐滿）↔ 素材（右，固定寬、影片放大）並排，消除右側空白 */
  .seg-body { display: flex; gap: 18px; align-items: flex-start; }
  .seg-main { flex: 1 1 0; min-width: 0; }
  .seg-slotcol { flex: 0 0 clamp(360px, 40%, 560px); }
  @media (max-width: 820px) { .seg-body { flex-direction: column; } .seg-slotcol { flex-basis: auto; width: 100%; } }
  .seg-hd { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
  .kind { font-size: 12px; font-weight: 700; padding: 2px 9px; border-radius: 6px; letter-spacing: .5px; }
  .kind.narration { background: #2a3a4d; color: #bcd6f2; }
  .kind.host { background: #4a2f12; color: #f0c98a; }
  .kind.intro, .kind.timecard { background: #14323a; color: #8fe0d6; }
  .kind.ending { background: #3a1430; color: #e7a6d4; }
  .seg-id { color: #6f8aa6; font-size: 13px; }
  .seg-title { font-weight: 600; color: #cfe0f1; font-size: 16px; }
  .seg-stat { margin-left: auto; color: #6f8aa6; font-size: 13px; white-space: nowrap; }
  .narr { color: #c2cfdc; background: #0c1219; border: 1px solid #1b2735; border-radius: 8px; padding: 10px 12px; margin: 8px 0 12px; white-space: pre-wrap; }
  .segacts { display: flex; gap: 6px; margin-left: 8px; }
  .segacts button { background: #16202c; color: #cfe0f1; border: 1px solid #2a3a4d; border-radius: 6px; padding: 3px 9px; font-size: 12px; cursor: pointer; }
  .segacts button:hover { border-color: #4f86c0; background: #15293c; }
  .segacts button.on { background: #14331c; border-color: #2f6d3f; color: #93d8a3; }
  .preview { margin: 8px 0 4px; }
  .preview video { width: 100%; max-width: 640px; border-radius: 8px; background: #060a0f; display: block; }
  .preview .lbl { color: #8fbf9f; font-size: 12px; margin-bottom: 4px; }

  .slots { display: flex; flex-wrap: wrap; gap: 12px; }
  .slot { flex: 1 1 200px; min-width: 0; background: #0e1620; border: 1px solid #1d2a38; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .slot video, .slot img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 7px; background: #060a0f; display: block; }
  .slot .empty { width: 100%; aspect-ratio: 16/9; border-radius: 7px; background: #060a0f; display: flex; align-items: center; justify-content: center; color: #44566a; border: 1px dashed #2a3a4d; font-size: 13px; }
  .tag { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 5px; }
  .tag.real { background: #14331c; color: #93d8a3; }
  .tag.ai { background: #2e2440; color: #c4a6e7; }
  .tag.manual { background: #3a2f12; color: #e7cf8a; }
  .tag.composed { background: #14283a; color: #8fbfe0; }
  .tag.unknown { background: #2a3340; color: #8aa0b5; }
  .tag.main { background: #143a2a; color: #8ee0b0; }
  .tag.fill { background: #2a2640; color: #b3a6e0; }
  .tag.dup { background: #3a2a14; color: #e0b97a; }
  .slot-top { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
  .slot-top .range { font-size: 12px; color: #9fc7ee; font-family: ui-monospace, monospace; margin-right: auto; }
  .fills { margin-top: 12px; border-top: 1px dashed #2a3a4d; padding-top: 8px; }
  .fills > summary { cursor: pointer; color: #b3a6e0; font-size: 13px; padding: 4px 0; list-style: none; user-select: none; }
  .fills > summary::before { content: '▸ '; }
  .fills[open] > summary::before { content: '▾ '; }
  .fills > summary:hover { color: #cfc0f5; }
  .fillgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin-top: 10px; }
  .fillgrid .slot { padding: 8px; }
  .fillgrid .slot .pq, .fillgrid .slot select.mode { font-size: 11px; }
  .slot .fn { font-size: 12px; color: #8295a8; word-break: break-all; }
  .slot .lic { font-size: 11px; color: #6f8aa6; }
  .slot .pq { width: 100%; background: #0a1119; color: #cfe0f1; border: 1px solid #223040; border-radius: 6px; padding: 6px 8px; font-size: 12px; resize: vertical; min-height: 38px; font-family: inherit; }
  .composed-note { color: #6f8aa6; font-size: 13px; padding: 6px 0; }
  .slot .ctrl { display: flex; gap: 6px; align-items: center; }
  .slot select.mode { flex: 1; background: #0a1119; color: #cfe0f1; border: 1px solid #223040; border-radius: 6px; padding: 5px 6px; font-size: 12px; }
  .slot .acts { display: flex; flex-wrap: wrap; gap: 5px; }
  .slot .acts button { background: #16202c; color: #cfe0f1; border: 1px solid #2a3a4d; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; }
  .slot .acts button:hover { border-color: #4f86c0; background: #15293c; }
  .slot .acts button.danger:hover { border-color: #b05050; background: #3a1717; color: #f2c0c0; }
  .slot .acts button.primary { border-color: #3a5d86; background: #14283d; color: #cfe6ff; }
  #segs.busy { opacity: .55; pointer-events: none; }
  #status.run { color: #f0c98a; }
  .toast { position: fixed; right: 18px; bottom: 18px; background: #14283d; border: 1px solid #3a5d86; color: #cfe6ff; padding: 10px 14px; border-radius: 8px; font-size: 14px; opacity: 0; transition: .25s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .pk-mask { position: fixed; inset: 0; background: #000a; display: none; align-items: center; justify-content: center; z-index: 50; }
  .pk-mask.show { display: flex; }
  .pk { background: #0e1620; border: 1px solid #2a3a4d; border-radius: 12px; width: min(1100px, 94vw); max-height: 88vh; display: flex; flex-direction: column; }
  .pk-hd { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #1d2a38; }
  .pk-hd b { color: #cfe0f1; }
  .pk-hd .x { margin-left: auto; cursor: pointer; color: #8295a8; font-size: 20px; border: none; background: none; }
  .pk-body { padding: 14px 16px; overflow: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .pk-card { background: #121b26; border: 1px solid #223040; border-radius: 8px; padding: 8px; cursor: pointer; transition: .12s; }
  .pk-card:hover { border-color: #4f86c0; background: #15293c; }
  .pk-card.cur { border-color: #2f6d3f; cursor: default; }
  .pk-card.cur:hover { background: #121b26; }
  .pk-card video, .pk-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; background: #060a0f; display: block; }
  .pk-cap { font-size: 11px; color: #8295a8; margin-top: 5px; word-break: break-all; }
</style>
</head>
<body>
  <h1>素材檢視 / 編輯 — 逐段素材包</h1>
  <p class="hint">
    配音前的最後關卡：逐段檢視「旁白 ↔ 配的影片 / 圖片 / AI 示意」，掌握每段的素材包與結構。
    素材來源讀自上次渲染（<code>segment-manifest.json</code>）與硬碟實際槽檔；尚未渲染的段先以 <code>episode.json</code> 結構顯示。
  </p>

  <div class="bar">
    <label>案件：<select id="slug"></select></label>
    <span id="summary" class="meta"></span>
    <button class="btn" id="refresh">重新整理</button>
    <button class="btn" id="rerender" title="整片重渲，但不烙合成語音（畫面＋字幕＋BGM＋打字機音效）；供日後配真人聲">整片重渲（無語音）</button>
    <button class="btn" id="rerenderVoice" title="整片重渲並合成語音（TTS 簽名聲線）">合成語音版</button>
    <div class="pager">
      <button class="btn" id="prev">← 上一頁</button>
      <span id="pageinfo"></span>
      <button class="btn" id="next">下一頁 →</button>
    </div>
  </div>

  <div id="status" class="meta" style="min-height:20px;margin-bottom:8px;"></div>
  <div id="segs"></div>

  <script src="/episodes.js"></script>
  <script src="/segments.js"></script>
</body>
</html>
